version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install
    build:
      commands:
        # Smoke tests run before the build — a failing test aborts the deploy.
        - yarn test
        # Write all NEXT_* and AWS_* env vars to .env.production so Next.js
        # SSR functions and API routes can read them at runtime on Amplify.
        - env | grep -E "^(NEXT_|AWS_)" >> .env.production
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - .yarn/cache/**/*
